<!-- @dsCard group="Type" viewport="700x250" subtitle="Space Mono — the instrument readout: data, labels, counts" name="Mono / data" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:24px; display:grid; grid-template-columns:1fr 1fr; gap:18px 28px; }
  .item { }
  .v { font-family:var(--font-mono); color:var(--text-1); }
  .k { font-family:var(--font-mono); font-size:10px; color:var(--text-3); letter-spacing:.12em; text-transform:uppercase; margin-top:6px; }
  .label { font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); }
  .pill { display:inline-block; font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; color:var(--green); background:var(--green-dim); padding:5px 10px; border-radius:var(--radius-pill); }
</style></head>
<body>
  <div class="item"><div class="v" style="font-size:26px;font-weight:700">#017</div><div class="k">dex number · stat-xl / 700</div></div>
  <div class="item"><div class="v" style="font-size:19px;font-weight:700">1.2&nbsp;km</div><div class="k">distance · stat / 700</div></div>
  <div class="item"><div class="label">access · size · busyness</div><div class="k">uppercase label · 11 · 0.12em</div></div>
  <div class="item"><div class="v" style="font-size:12px">35.0394°&nbsp;N</div><div class="k">coordinate · mono-sm / 400</div></div>
  <div class="item"><span class="pill">PARIS · 3 OF 40</span><div class="k">completion label</div></div>
  <div class="item"><div class="v" style="font-size:19px;font-weight:700">80<span style="color:var(--text-3)">/140</span></div><div class="k">found / total</div></div>
</body></html>
