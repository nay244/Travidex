<!-- @dsCard group="Colors" viewport="700x340" subtitle="Fixed semantics — deep on light, glow on dark" name="Accent semantics" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#1b1e24; padding:20px; }
  .head { display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:12px; font-family:var(--font-mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:#79818f; margin-bottom:10px; padding:0 4px; }
  .row { display:grid; grid-template-columns:1.5fr 1fr 1fr; gap:12px; align-items:center; margin-bottom:10px; }
  .meaning { }
  .mt { font-family:var(--font-sans); font-weight:600; font-size:13px; color:#e8ebf1; }
  .mtok { font-family:var(--font-mono); font-size:10px; color:#79818f; margin-top:2px; }
  .chip { height:46px; border-radius:var(--radius-md); display:flex; align-items:center; gap:9px; padding:0 12px; }
  .chip.lt { background:#fff; box-shadow:inset 0 0 0 1px rgba(22,30,48,.10); }
  .chip.dk { background:#12151c; box-shadow:inset 0 0 0 1px rgba(255,255,255,.08); }
  .dot { width:20px; height:20px; border-radius:50%; flex:none; }
  .hex { font-family:var(--font-mono); font-size:11px; }
</style></head>
<body>
  <div class="head"><span>Meaning</span><span>Light · deep</span><span>Dark · glow</span></div>

  <div class="row">
    <div class="meaning"><div class="mt">Found · claimed · success</div><div class="mtok">--green</div></div>
    <div class="chip lt"><span class="dot" style="background:#1f9d57"></span><span class="hex" style="color:#15663b">#1f9d57</span></div>
    <div class="chip dk"><span class="dot" style="background:#4ade80;box-shadow:0 0 12px rgba(74,222,128,.55)"></span><span class="hex" style="color:#4ade80">#4ade80</span></div>
  </div>

  <div class="row">
    <div class="meaning"><div class="mt">In-progress · Log / Find</div><div class="mtok">--amber</div></div>
    <div class="chip lt"><span class="dot" style="background:#bd7d12"></span><span class="hex" style="color:#8f5e0e">#bd7d12</span></div>
    <div class="chip dk"><span class="dot" style="background:#e0a23c;box-shadow:0 0 12px rgba(224,162,60,.5)"></span><span class="hex" style="color:#e0a23c">#e0a23c</span></div>
  </div>

  <div class="row">
    <div class="meaning"><div class="mt">Personal data · info · type</div><div class="mtok">--blue</div></div>
    <div class="chip lt"><span class="dot" style="background:#2f6fe0"></span><span class="hex" style="color:#1d4fac">#2f6fe0</span></div>
    <div class="chip dk"><span class="dot" style="background:#8fb6ff"></span><span class="hex" style="color:#8fb6ff">#8fb6ff</span></div>
  </div>

  <div class="row">
    <div class="meaning"><div class="mt">Unseen · locked · disabled</div><div class="mtok">--locked</div></div>
    <div class="chip lt"><span class="dot" style="background:#aab2c0"></span><span class="hex" style="color:#838b99">#aab2c0</span></div>
    <div class="chip dk"><span class="dot" style="background:#3a4150"></span><span class="hex" style="color:#717b8b">#3a4150</span></div>
  </div>
</body></html>
