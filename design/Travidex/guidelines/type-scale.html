<!-- @dsCard group="Type" viewport="700x320" subtitle="Space Grotesk — display to micro" name="Type scale" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:24px; }
  .row { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid var(--divider); }
  .row:last-child { border-bottom:0; }
  .spec { font-family:var(--font-sans); color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta { margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--text-3); letter-spacing:.04em; white-space:nowrap; }
</style></head>
<body>
  <div class="row"><div class="spec" style="font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1">Kyoto</div><div class="meta">display · 34 / 700</div></div>
  <div class="row"><div class="spec" style="font-size:27px;font-weight:600;letter-spacing:-.01em">Your dex</div><div class="meta">h1 · 27 / 600</div></div>
  <div class="row"><div class="spec" style="font-size:21px;font-weight:600;letter-spacing:-.01em">Recent finds</div><div class="meta">h2 · 21 / 600</div></div>
  <div class="row"><div class="spec" style="font-size:17px;font-weight:600">Fushimi Inari Shrine</div><div class="meta">h3 · 17 / 600</div></div>
  <div class="row"><div class="spec" style="font-size:15px;font-weight:400">A mountain of vermilion torii gates winding up the hillside.</div><div class="meta">body · 15 / 400</div></div>
  <div class="row"><div class="spec" style="font-size:13px;font-weight:400;color:var(--text-2)">Reference — what to look for</div><div class="meta">caption · 13 / 400</div></div>
</body></html>
