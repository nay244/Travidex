<!-- @dsCard group="Brand" viewport="700x220" subtitle="Mark = chunk tile filling green + found pin dot · wordmark in Space Grotesk" name="Logo & lockup" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:26px 28px; display:flex; align-items:center; gap:40px; flex-wrap:wrap; }
  .lockup { display:flex; align-items:center; gap:16px; }
  .word { font-family:var(--font-sans); font-weight:700; font-size:34px; letter-spacing:-.02em; color:var(--text-1); }
  .word b { color:var(--green); }
  .stack { display:flex; flex-direction:column; gap:4px; align-items:center; }
  .tag { font-family:var(--font-mono); font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--text-3); }
  .onlight { background:var(--surface-1); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:18px 22px; }
  img { display:block; }
</style></head>
<body>
  <div class="lockup">
    <img src="../assets/travidex-mark.svg" width="68" height="68" alt="Travidex mark">
    <div class="stack" style="align-items:flex-start">
      <div class="word">Travi<b>dex</b></div>
      <div class="tag">collect the world</div>
    </div>
  </div>
  <div class="onlight">
    <img src="../assets/travidex-mark.svg" width="56" height="56" alt="Travidex mark on card">
  </div>
</body></html>
