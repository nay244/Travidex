<!-- @dsCard group="Spacing" viewport="700x180" subtitle="4pt base grid" name="Spacing scale" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:24px; display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; }
  .u { text-align:center; }
  .bar { background:var(--amber); border-radius:3px; width:100%; }
  .px { font-family:var(--font-mono); font-size:11px; color:var(--text-1); margin-top:8px; }
  .nm { font-family:var(--font-mono); font-size:9px; color:var(--text-3); letter-spacing:.06em; }
</style></head>
<body>
  <div class="u" style="width:4px"><div class="bar" style="height:4px"></div></div>
  <div class="u" style="width:8px"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="nm">s-3</div></div>
  <div class="u" style="width:12px"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="nm">s-4</div></div>
  <div class="u" style="width:16px"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="nm">s-5</div></div>
  <div class="u" style="width:20px"><div class="bar" style="height:20px"></div><div class="px">20</div><div class="nm">s-6</div></div>
  <div class="u" style="width:24px"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="nm">s-7</div></div>
  <div class="u" style="width:32px"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="nm">s-8</div></div>
  <div class="u" style="width:40px"><div class="bar" style="height:40px"></div><div class="px">40</div><div class="nm">s-9</div></div>
  <div class="u" style="width:48px"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="nm">s-10</div></div>
  <div class="u" style="width:64px"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="nm">s-11</div></div>
</body></html>
