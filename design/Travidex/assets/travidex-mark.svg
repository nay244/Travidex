<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Travidex mark">
  <defs>
    <clipPath id="tile"><rect x="10" y="10" width="76" height="76" rx="22"></rect></clipPath>
    <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect x="10" y="10" width="76" height="76" rx="22" fill="#12151c"></rect>
  
  <g clip-path="url(#tile)">
    <rect x="10" y="50" width="76" height="36" fill="#4ade80" opacity="0.16"></rect>
    <rect x="10" y="50" width="76" height="2.5" fill="#4ade80" opacity="0.55"></rect>
  </g>
  
  <rect x="10" y="10" width="76" height="76" rx="22" fill="none" stroke="#4ade80" stroke-opacity="0.45" stroke-width="2"></rect>

  
  <circle cx="48" cy="45" r="11" fill="#4ade80" filter="url(#dotGlow)"></circle>
  <circle cx="48" cy="45" r="4.5" fill="#0d0f14"></circle>
</svg>